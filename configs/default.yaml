data:
  data_dir: data/Raabin-WBC
  image_size: 224
  batch_size: 16
  num_workers: 4
  val_split: 0.2
  test_split: 0.0
  seed: 42
  augment_lisc: false
model:
  num_classes: 5
  image_size: 224
  patch_size: 16
  in_channels: 3
  embed_dim: 128
  depth: 4
  num_heads: 4
  kan_hidden_dim: 256
  dropout: 0.1
  rbf_grid_size: 8
train:
  epochs: 100
  learning_rate: 0.0001
  weight_decay: 0.0001
  optimizer: adamw
  scheduler: cosine_restarts
  mixed_precision: true
  output_dir: runs/sckatisation_net
  early_stopping_patience: 20
  grad_clip_norm: 1.0
